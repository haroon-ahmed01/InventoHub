services:
  - type: web
    name: inventory-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn inventory_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: "postgresql://inventory_user:${DATABASE_PASSWORD}@dpg-cusrf9dsvqrc73e0j9ag-a.oregon-postgres.render.com/inventory_db"
      - key: DATABASE_PASSWORD
        generateValue: true
      - key: DJANGO_SECRET_KEY
        value: "b7d3f8a9c2e5-47f1-91d6-a3b4e0f9c8d7"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "inventohub-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://inventohub-frontend.onrender.com"
      - key: PYTHONPATH
        value: "/opt/render/project/src"
      - key: DJANGO_SETTINGS_MODULE
        value: "inventory_project.settings"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"

  - type: web
    name: inventory-frontend
    env: node
    buildCommand: "cd inventory_client && npm install && npm run build"
    startCommand: "cd inventory_client && npm run preview"
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: VITE_API_URL
        value: "https://inventohub-backend.onrender.com/api"

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user 