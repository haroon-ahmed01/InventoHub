services:
  - type: web
    name: inventory-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn inventory_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        value: "b7d3f8a9c2e5-47f1-91d6-a3b4e0f9c8d7"
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "inventohub-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://inventohub-frontend.onrender.com"

  - type: web
    name: inventory-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        value: "https://inventohub-backend.onrender.com/api"

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user 